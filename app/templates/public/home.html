{% extends "base.html" %}
{% block title %}Archives World Map{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
{% endblock %}

{% block content %}
<div id="map-wrapper">
    <div id="mapid"></div>
    <div id="cluster-toggle-wrap">
        <label class="cluster-toggle-label">
            <input type="checkbox" id="cluster-toggle">
            <span data-i18n="btn_cluster">Cluster</span>
        </label>
    </div>
</div>
<div class="row" style="margin-top:25px;">
    <div class="col-md-6 col-md-offset-3 text-center">
        <h4 data-i18n="home_search_title">Search institutions</h4>
        <form action="{{ url_for('public.search') }}" method="get">
            <div class="input-group input-group-lg">
                <input type="text" name="search" class="form-control" placeholder="Search by name..." data-i18n-placeholder="home_search_placeholder">
                <input type="hidden" name="qty" value="10">
                <input type="hidden" name="since" value="0">
                <span class="input-group-btn">
                    <button type="submit" class="btn btn-primary" data-i18n="btn_search">Search</button>
                </span>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
var isMobile = window.innerWidth < 768;
var defaultView = isMobile ? [10, -15] : [20, 0];
var mymap = L.map('mapid').setView(defaultView, 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 18
}).addTo(mymap);

var allPins = [];
var clusterGroup = L.markerClusterGroup();
var plainGroup = L.layerGroup();
var useClusters = false;

function countryFlag(code) {
    if (!code || code.length !== 2) return '';
    return Array.from(code.toUpperCase()).map(function(c) {
        return String.fromCodePoint(0x1F1E6 + c.charCodeAt(0) - 65);
    }).join('');
}

function countryName(code) {
    if (!code) return '';
    try {
        var lang = window.awmLang || 'en';
        var bcp = lang === 'pt-br' ? 'pt-BR' : lang;
        var dn = new Intl.DisplayNames([bcp], {type: 'region'});
        return dn.of(code.toUpperCase()) || code;
    } catch(e) {
        return code;
    }
}

function buildPopup(p) {
    var dict = window.i18nDict || {};
    var moreInfo = dict['popup_more_info'] || 'More information';
    var location = [];
    if (p.city) location.push(p.city);
    if (p.district) location.push(p.district);
    var countryPart = '';
    if (p.country) {
        countryPart = '<br>' + countryFlag(p.country) + ' ' + countryName(p.country);
    }
    var locationLine = location.length ? '<br><span style="color:#555;">' + location.join(', ') + '</span>' : '';
    return '<div style="font-size:14px;line-height:1.6;">' +
        '<strong style="font-size:16px;">' + p.name + '</strong>' +
        locationLine +
        countryPart +
        '<br><a href="/info/' + p.id + '">' + moreInfo + '</a>' +
        '</div>';
}

fetch('/api/pins')
  .then(function(r) { return r.json(); })
  .then(function(pins) {
    allPins = pins;
    pins.forEach(function(p) {
      var marker = L.marker([p.lat, p.lng]).bindPopup(function() { return buildPopup(p); }, {maxWidth: 300, minWidth: 150});
      clusterGroup.addLayer(marker);
      plainGroup.addLayer(L.marker([p.lat, p.lng]).bindPopup(function() { return buildPopup(p); }, {maxWidth: 300, minWidth: 150}));
    });
    mymap.addLayer(plainGroup);
  });

document.getElementById('cluster-toggle').addEventListener('change', function() {
    useClusters = this.checked;
    if (useClusters) {
        mymap.removeLayer(plainGroup);
        mymap.addLayer(clusterGroup);
    } else {
        mymap.removeLayer(clusterGroup);
        mymap.addLayer(plainGroup);
    }
});
</script>
{% endblock %}
