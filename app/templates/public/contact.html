{% extends "base.html" %}
{% block title %}Contact - Archives World Map{% endblock %}
{% block content %}
<h2 data-i18n="contact_title">Contact us</h2>
<form method="post" action="{{ url_for('public.contact_submit') }}">
    <div class="form-group">
        <label data-i18n="contact_name">Your name</label>
        <input type="text" name="name" class="form-control" required>
    </div>
    <div class="form-group">
        <label data-i18n="contact_email">Your email</label>
        <input type="email" name="email" class="form-control" required>
    </div>
    <div class="form-group">
        <label data-i18n="contact_institution">Institution</label>
        <input type="text" name="institution" class="form-control">
    </div>
    <div class="form-group">
        <label data-i18n="contact_subject">Subject</label>
        <input type="text" name="subject" class="form-control" required>
    </div>
    <div class="form-group">
        <label data-i18n="contact_message">Message</label>
        <textarea name="body" class="form-control" rows="5" required></textarea>
    </div>
    {% if recaptcha_enabled %}
    <input type="hidden" name="g-recaptcha-response" id="recaptcha-contact">
    {% endif %}
    <button type="submit" class="btn btn-primary" data-i18n="btn_send">Send</button>
</form>
{% endblock %}
{% block scripts %}
{% if recaptcha_enabled %}
<script src="https://www.google.com/recaptcha/api.js?render={{ recaptcha_site_key }}"></script>
<script>
document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault();
    var form = this;
    grecaptcha.ready(function() {
        grecaptcha.execute('{{ recaptcha_site_key }}', {action: 'contact'}).then(function(token) {
            document.getElementById('recaptcha-contact').value = token;
            form.submit();
        });
    });
});
</script>
{% endif %}
{% endblock %}
