{% extends "base.html" %}
{% block title %}Forgot Password - Archives World Map{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-4 col-md-offset-4">
        <h2>Forgot Password</h2>
        <p class="text-muted" data-i18n="forgot_pwd_description">Enter your username or email address. A temporary 20-character password will be sent to your email. It expires in 1 hour.</p>
        <form method="post" action="{{ url_for('admin.forgot_password_submit') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label data-i18n="forgot_pwd_identifier_label">Username or email</label>
                <input type="text" name="identifier" class="form-control" required autofocus>
            </div>
            <button type="submit" class="btn btn-warning btn-block" data-i18n="forgot_pwd_send">Send temporary password</button>
        </form>
        <p class="text-center" style="margin-top:15px;">
            <a href="{{ url_for('admin.login') }}" class="text-muted small" data-i18n="admin_back_to_login">Back to login</a>
        </p>
    </div>
</div>
{% endblock %}
