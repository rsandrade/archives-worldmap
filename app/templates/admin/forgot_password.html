{% extends "base.html" %}
{% block title %}Forgot Password - Archives World Map{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-4 col-md-offset-4">
        <h2>Forgot Password</h2>
        <p class="text-muted">A temporary 20-character password will be sent to the admin email address. It expires in 1 hour.</p>
        <form method="post" action="{{ url_for('admin.forgot_password_submit') }}">
            <button type="submit" class="btn btn-warning btn-block">Send temporary password</button>
        </form>
        <p class="text-center" style="margin-top:15px;">
            <a href="{{ url_for('admin.login') }}" class="text-muted small">Back to login</a>
        </p>
    </div>
</div>
{% endblock %}
