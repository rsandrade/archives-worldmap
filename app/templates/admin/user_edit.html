{% extends "base.html" %}
{% block title %}Edit User - Archives World Map{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-6 col-md-offset-3">
        <h2>Edit user: {{ user['username'] }} <small><a href="{{ url_for('admin.users') }}">Back to users</a></small></h2>

        <form method="post" action="{{ url_for('admin.user_edit_submit', user_id=user['id']) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Username</label>
                <input type="text" class="form-control" value="{{ user['username'] | e }}" disabled>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-control" value="{{ user['email'] | e }}" required>
            </div>
            <div class="form-group">
                <label>Permissions</label>
                <div class="checkbox">
                    <label>
                        <input type="checkbox" name="can_approve" {% if user['can_approve'] %}checked{% endif %}>
                        Approve / reject submissions
                    </label>
                </div>
                <div class="checkbox">
                    <label>
                        <input type="checkbox" name="can_edit_waiting" {% if user['can_edit_waiting'] %}checked{% endif %}>
                        Edit pending submissions
                    </label>
                </div>
                <div class="checkbox">
                    <label>
                        <input type="checkbox" name="can_edit_verified" {% if user['can_edit_verified'] %}checked{% endif %}>
                        Edit approved submissions
                    </label>
                </div>
            </div>
            <div class="checkbox">
                <label>
                    <input type="checkbox" name="is_active" {% if user['is_active'] %}checked{% endif %}>
                    Active (uncheck to disable login)
                </label>
            </div>
            <button type="submit" class="btn btn-primary">Save changes</button>
            <a href="{{ url_for('admin.users') }}" class="btn btn-default">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
