{% extends "base.html" %}
{% block title %}Edit Institution - Archives World Map{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-8 col-md-offset-2">
        <h2><span data-i18n="edit_title">Edit</span>: {{ institution['name'] }}</h2>

        <div class="form-group" style="position:relative;">
            <div class="input-group">
                <input type="text" id="geocode-input" class="form-control" data-i18n-placeholder="add_search_address" placeholder="Search address..." autocomplete="off">
                <span class="input-group-btn">
                    <button type="button" id="geocode-btn" class="btn btn-default" data-i18n="btn_search">Search</button>
                </span>
            </div>
            <ul id="geocode-results" style="display:none;position:absolute;z-index:2000;width:100%;background:#fff;border:1px solid #ccc;border-top:none;list-style:none;margin:0;padding:0;max-height:220px;overflow-y:auto;box-shadow:0 4px 8px rgba(0,0,0,0.1);"></ul>
        </div>

        <div id="mapid" style="height:280px;margin-bottom:15px;"></div>

        <form method="post" action="{{ url_for('admin.edit_submit', inst_id=institution['id']) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label data-i18n="add_inst_name">Institution name</label>
                <input type="text" name="name" class="form-control" value="{{ institution['name'] }}" required>
            </div>
            <div class="row">
                <div class="col-md-6"><div class="form-group">
                    <label data-i18n="edit_latitude">Latitude</label>
                    <input type="text" name="latitude" id="latitude" class="form-control" value="{{ institution['latitude'] }}" required>
                </div></div>
                <div class="col-md-6"><div class="form-group">
                    <label data-i18n="edit_longitude">Longitude</label>
                    <input type="text" name="longitude" id="longitude" class="form-control" value="{{ institution['longitude'] }}" required>
                </div></div>
            </div>
            <div class="form-group">
                <label data-i18n="add_identifier">Identifier (ISIL, etc.)</label>
                <input type="text" name="identifier" class="form-control" value="{{ institution['identifier'] or '' }}">
            </div>
            <div class="form-group">
                <label data-i18n="add_address">Address</label>
                <input type="text" name="address" id="field-address" class="form-control" value="{{ institution['address'] or '' }}">
            </div>
            <div class="row">
                <div class="col-md-4"><div class="form-group">
                    <label data-i18n="add_city">City</label>
                    <input type="text" name="city" id="field-city" class="form-control" value="{{ institution['city'] or '' }}">
                </div></div>
                <div class="col-md-4"><div class="form-group">
                    <label data-i18n="add_district">District / State</label>
                    <input type="text" name="district" id="field-district" class="form-control" value="{{ institution['district'] or '' }}">
                </div></div>
                <div class="col-md-4"><div class="form-group">
                    <label data-i18n="add_country">Country</label>
                    <input type="text" id="country-filter" class="form-control" data-i18n-placeholder="add_country_search" placeholder="Search country..." autocomplete="off" style="margin-bottom:4px;">
                    <select name="country" id="field-country" class="form-control">
                        <option value=""></option>
                    </select>
                </div></div>
            </div>
            <div class="row">
                <div class="col-md-6"><div class="form-group">
                    <label data-i18n="add_website">Website</label>
                    <input type="url" name="url" class="form-control" value="{{ institution['url'] or '' }}">
                </div></div>
                <div class="col-md-6"><div class="form-group">
                    <label data-i18n="add_inst_email">Institution email</label>
                    <input type="email" name="email" class="form-control" value="{{ institution['email'] or '' }}">
                </div></div>
            </div>
            <div class="form-group">
                <label data-i18n="edit_admin_notes">Admin notes</label>
                <textarea name="admin_notes" class="form-control" rows="3">{{ (institution['admin_notes'] or '')|e }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary" data-i18n="btn_save">Save</button>
            <a href="{{ url_for('admin.dashboard') }}" class="btn btn-default" data-i18n="btn_cancel">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
var lat = {{ institution['latitude']|tojson }}, lng = {{ institution['longitude']|tojson }};
var mymap = L.map('mapid').setView([lat, lng], 14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors', maxZoom: 18
}).addTo(mymap);

var marker = L.marker([lat, lng], {draggable: true}).addTo(mymap);
marker.on('dragend', function(e) {
    var pos = e.target.getLatLng();
    document.getElementById('latitude').value = pos.lat;
    document.getElementById('longitude').value = pos.lng;
});

function placeMarker(lat, lng) {
    marker.setLatLng([lat, lng]);
    document.getElementById('latitude').value = lat;
    document.getElementById('longitude').value = lng;
}

mymap.on('click', function(e) {
    placeMarker(e.latlng.lat, e.latlng.lng);
});

// Sync lat/lng text inputs → marker
['latitude', 'longitude'].forEach(function(id) {
    document.getElementById(id).addEventListener('change', function() {
        var la = parseFloat(document.getElementById('latitude').value);
        var lo = parseFloat(document.getElementById('longitude').value);
        if (!isNaN(la) && !isNaN(lo)) {
            marker.setLatLng([la, lo]);
            mymap.setView([la, lo]);
        }
    });
});

// Geocoding via Nominatim
function simplifyQuery(q) {
    var s = q.replace(/\b\d{4,8}(-\d{3,4})?\b/g, '');
    s = s.replace(/,\s*,/g, ',').replace(/^[\s,]+|[\s,]+$/g, '').trim();
    return s !== q ? s : null;
}

function nominatimSearch(q, callback) {
    fetch('https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=5&q=' + encodeURIComponent(q))
        .then(function(r) { return r.json(); }).then(callback).catch(function() { callback([]); });
}

function fillFromPlace(place) {
    var la = parseFloat(place.lat), lo = parseFloat(place.lon);
    placeMarker(la, lo);
    mymap.setView([la, lo], 16);
    var addr = place.address || {};
    var road = [addr.road, addr.house_number].filter(Boolean).join(' ');
    if (road) document.getElementById('field-address').value = road;
    if (addr.city || addr.town || addr.village)
        document.getElementById('field-city').value = addr.city || addr.town || addr.village;
    if (addr.state)
        document.getElementById('field-district').value = addr.state;
    if (addr.country_code)
        setCountry(addr.country_code.toUpperCase());
    hideResults();
}

function showResults(places) {
    var list = document.getElementById('geocode-results');
    list.innerHTML = '';
    if (!places.length) {
        var li = document.createElement('li');
        li.textContent = 'No results found.';
        li.style.cssText = 'padding:8px 12px;color:#999;font-size:13px;';
        list.appendChild(li);
    } else {
        places.forEach(function(place) {
            var li = document.createElement('li');
            li.textContent = place.display_name;
            li.style.cssText = 'padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #eee;';
            li.addEventListener('mouseenter', function() { this.style.background = '#f5f5f5'; });
            li.addEventListener('mouseleave', function() { this.style.background = ''; });
            li.addEventListener('click', function() { fillFromPlace(place); });
            list.appendChild(li);
        });
    }
    list.style.display = 'block';
}

function hideResults() {
    document.getElementById('geocode-results').style.display = 'none';
}

function geocodeAddress() {
    var q = document.getElementById('geocode-input').value.trim();
    if (!q) return;
    nominatimSearch(q, function(data) {
        if (data.length) { showResults(data); return; }
        var simplified = simplifyQuery(q);
        if (simplified) {
            nominatimSearch(simplified, function(data2) { showResults(data2); });
        } else {
            showResults([]);
        }
    });
}

// Country combobox
var ALL_CODES = [
  'AD','AE','AF','AG','AI','AL','AM','AO','AQ','AR','AS','AT','AU','AW','AX','AZ',
  'BA','BB','BD','BE','BF','BG','BH','BI','BJ','BL','BM','BN','BO','BQ','BR','BS',
  'BT','BV','BW','BY','BZ','CA','CC','CD','CF','CG','CH','CI','CK','CL','CM','CN',
  'CO','CR','CU','CV','CW','CX','CY','CZ','DE','DJ','DK','DM','DO','DZ','EC','EE',
  'EG','EH','ER','ES','ET','FI','FJ','FK','FM','FO','FR','GA','GB','GD','GE','GF',
  'GG','GH','GI','GL','GM','GN','GP','GQ','GR','GS','GT','GU','GW','GY','HK','HM',
  'HN','HR','HT','HU','ID','IE','IL','IM','IN','IO','IQ','IR','IS','IT','JE','JM',
  'JO','JP','KE','KG','KH','KI','KM','KN','KP','KR','KW','KY','KZ','LA','LB','LC',
  'LI','LK','LR','LS','LT','LU','LV','LY','MA','MC','MD','ME','MF','MG','MH','MK',
  'ML','MM','MN','MO','MP','MQ','MR','MS','MT','MU','MV','MW','MX','MY','MZ','NA',
  'NC','NE','NF','NG','NI','NL','NO','NP','NR','NU','NZ','OM','PA','PE','PF','PG',
  'PH','PK','PL','PM','PN','PR','PS','PT','PW','PY','QA','RE','RO','RS','RU','RW',
  'SA','SB','SC','SD','SE','SG','SH','SI','SJ','SK','SL','SM','SN','SO','SR','SS',
  'ST','SV','SX','SY','SZ','TC','TD','TF','TG','TH','TJ','TK','TL','TM','TN','TO',
  'TR','TT','TV','TZ','UA','UG','UM','US','UY','UZ','VA','VC','VE','VG','VI','VN',
  'VU','WF','WS','YE','YT','ZA','ZM','ZW'
];

var allCountryOptions = [];

function langToLocale(lang) {
  return lang === 'pt-br' ? 'pt-BR' : lang;
}

function buildCountryOptions(lang) {
  var locale = langToLocale(lang);
  var dn;
  try { dn = new Intl.DisplayNames([locale], {type: 'region'}); } catch(e) { dn = null; }
  allCountryOptions = ALL_CODES.map(function(code) {
    var name = code;
    try { if (dn) name = dn.of(code) || code; } catch(e) {}
    return {code: code, name: name};
  }).filter(function(o) { return o.name && o.name !== o.code; });
  allCountryOptions.sort(function(a, b) { return a.name.localeCompare(b.name, locale); });
}

function renderCountryOptions(filter, selectedCode) {
  var sel = document.getElementById('field-country');
  var q = (filter || '').toLowerCase();
  sel.innerHTML = '<option value=""></option>';
  allCountryOptions.forEach(function(o) {
    if (q && o.name.toLowerCase().indexOf(q) === -1 && o.code.toLowerCase().indexOf(q) === -1) return;
    var opt = document.createElement('option');
    opt.value = o.code;
    opt.textContent = o.name + ' (' + o.code + ')';
    if (o.code === selectedCode) opt.selected = true;
    sel.appendChild(opt);
  });
}

function setCountry(code) {
  document.getElementById('country-filter').value = '';
  renderCountryOptions('', code);
}

function initCountrySelect() {
  var lang = window.awmLang || localStorage.getItem('awm_lang') || 'en';
  var currentCode = {{ (institution['country'] or '')|tojson }};
  buildCountryOptions(lang);
  renderCountryOptions('', currentCode);

  document.getElementById('country-filter').addEventListener('input', function() {
    var sel = document.getElementById('field-country');
    var cur = sel.value;
    renderCountryOptions(this.value, cur);
  });

  document.addEventListener('awm:langchange', function(e) {
    var sel = document.getElementById('field-country');
    var cur = sel.value;
    buildCountryOptions(e.detail.lang);
    renderCountryOptions(document.getElementById('country-filter').value, cur);
  });
}

initCountrySelect();

var geocodeTimer;
document.getElementById('geocode-input').addEventListener('input', function() {
    clearTimeout(geocodeTimer);
    var q = this.value.trim();
    if (q.length < 4) { hideResults(); return; }
    geocodeTimer = setTimeout(geocodeAddress, 500);
});
document.getElementById('geocode-btn').addEventListener('click', geocodeAddress);
document.getElementById('geocode-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); geocodeAddress(); }
});
document.addEventListener('click', function(e) {
    var results = document.getElementById('geocode-results');
    if (!results.contains(e.target) && e.target.id !== 'geocode-input' && e.target.id !== 'geocode-btn')
        hideResults();
});
</script>
{% endblock %}
