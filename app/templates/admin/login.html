{% extends "base.html" %}
{% block title %}Admin Login - Archives World Map{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-4 col-md-offset-4">
        <h2 data-i18n="admin_login_title">Admin Login</h2>
        <form method="post" action="{{ url_for('admin.login_submit') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label data-i18n="admin_username">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label data-i18n="admin_password">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" data-i18n="btn_login">Login</button>
        </form>
        <p class="text-center" style="margin-top:15px;">
            <a href="{{ url_for('admin.forgot_password') }}" class="text-muted small">Forgot password?</a>
        </p>
    </div>
</div>
{% endblock %}
