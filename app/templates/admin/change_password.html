{% extends "base.html" %}
{% block title %}Change Password - Archives World Map{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-4 col-md-offset-4">
        <h2>Change Password</h2>
        <form method="post" action="{{ url_for('admin.change_password_submit') }}">
            <div class="form-group">
                <label>Current password</label>
                <input type="password" name="current_password" class="form-control" required autofocus>
            </div>
            <div class="form-group">
                <label>New password</label>
                <input type="password" name="new_password" class="form-control" required minlength="8">
            </div>
            <div class="form-group">
                <label>Confirm new password</label>
                <input type="password" name="confirm_password" class="form-control" required minlength="8">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Save new password</button>
        </form>
        <p class="text-center" style="margin-top:15px;">
            <a href="{{ url_for('admin.dashboard') }}" class="text-muted small">Cancel</a>
        </p>
    </div>
</div>
{% endblock %}
